name: Build and Release

on:
  release:
    types: [published]

jobs:
  build:
    # This permission is still required by the new action
    permissions:
      contents: write

    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'adopt'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4
      with:
        gradle-version: wrapper

    # Build Step - No changes needed here
    - name: Run Gradle Build
      run: |
        if [ "${{ github.event_name }}" == "release" ]; then
          VERSION=${{ github.event.release.tag_name }}
          VERSION=${VERSION#v}  # Strip 'v' if present
          ./gradlew clean build -Pversion=$VERSION
        else
          ./gradlew clean build
        fi
        
    - name: Upload Artifact to GitHub Release
      if: ${{ github.event_name == 'release' }}
      uses: softprops/action-gh-release@v2
      with:
        # The 'files' input takes a path to the asset(s) you want to upload.
        # Keep a stable filename for external download links.
        files: ./build/libs/OldCombatMechanics.jar

    - name: Read game versions from gradle.properties
      run: |
        RAW=$(grep ^gameVersions gradle.properties | cut -d'=' -f2-)
        # Convert "1.21, 1.20.6" -> "Minecraft 1.21:1.21,Minecraft 1.20.6:1.20.6" to disambiguate Bukkit versions
        GAME_VERSIONS=$(echo "$RAW" | tr -d ' ' | awk -F',' '{
          out="";
          for (i=1; i<=NF; i++) {
            v=$i;
            if (v!= "") {
              if (out!= "") out=out ",";
              out=out "Minecraft " v ":" v;
            }
          }
          print out;
        }')
        echo "GAME_VERSIONS=$GAME_VERSIONS" >> "$GITHUB_ENV"

    - name: Debug CurseForge version resolution
      if: ${{ github.event_name == 'release' }}
      env:
        DBO_UPLOAD_API_TOKEN: ${{ secrets.DBO_UPLOAD_API_TOKEN }}
      run: |
        python3 - <<'PY'
        import json
        import os
        import sys
        import urllib.request

        token = os.environ["DBO_UPLOAD_API_TOKEN"]

        with open("gradle.properties", "r", encoding="utf-8") as handle:
            for line in handle:
                if line.startswith("gameVersions="):
                    requested_versions = [part.strip() for part in line.split("=", 1)[1].split(",") if part.strip()]
                    break
            else:
                raise SystemExit("gameVersions property not found in gradle.properties")

        def fetch_json(url: str):
            request = urllib.request.Request(url, headers={"X-Api-Token": token})
            with urllib.request.urlopen(request) as response:
                return json.load(response)

        def print_endpoint_report(endpoint: str):
            print(f"::group::CurseForge version debug ({endpoint})")
            try:
                version_types = fetch_json(f"https://{endpoint}.curseforge.com/api/game/version-types")
                versions = fetch_json(f"https://{endpoint}.curseforge.com/api/game/versions")
            except Exception as exc:
                print(f"Failed to query {endpoint} endpoint: {exc}")
                print("::endgroup::")
                return

            type_names = {
                item["id"]: item.get("name") or item.get("slug") or str(item["id"])
                for item in version_types
            }
            versions_by_name = {}
            for item in versions:
                versions_by_name.setdefault(item.get("name"), []).append(item)

            print("Available version types:")
            for item in version_types:
                print(f"  - id={item['id']} name={item.get('name')} slug={item.get('slug')}")

            print("Requested version matches:")
            missing = []
            for version in requested_versions:
                matches = versions_by_name.get(version, [])
                if not matches:
                    missing.append(version)
                    print(f"  - {version}: NO MATCH")
                    continue
                print(f"  - {version}:")
                for match in matches:
                    type_id = match.get("gameVersionTypeID")
                    type_name = type_names.get(type_id, f"unknown:{type_id}")
                    print(
                        "      "
                        f"id={match.get('id')} typeId={type_id} type={type_name} "
                        f"name={match.get('name')} slug={match.get('slug')}"
                    )

            if missing:
                print("Missing requested versions:")
                for version in missing:
                    print(f"  - {version}")
            else:
                print("All requested versions matched by name on this endpoint.")

            print("::endgroup::")

        for endpoint_name in ("bukkit", "minecraft"):
            print_endpoint_report(endpoint_name)
        PY
        
    - name: Upload to CurseForge (Bukkit)
      if: ${{ github.event_name == 'release' }}
      uses: itsmeow/curseforge-upload@v3
      with:
        token: ${{ secrets.DBO_UPLOAD_API_TOKEN }}
        project_id: '98233'
        game_endpoint: 'bukkit'
        file_path: './build/libs/OldCombatMechanics.jar'
        changelog: ${{ github.event.release.body }}
        changelog_type: 'markdown'
        release_type: 'release'
        display_name: 'OldCombatMechanics ${{ github.event.release.tag_name }}'
        game_versions: ${{ env.GAME_VERSIONS }}


    - name: Publish to Hangar
      env:
        HANGAR_API_TOKEN: ${{ secrets.HANGAR_API_TOKEN }}
        HANGAR_CHANGELOG: ${{ github.event.release.body }}
      run: ./gradlew build publishPluginPublicationToHangar --stacktrace
