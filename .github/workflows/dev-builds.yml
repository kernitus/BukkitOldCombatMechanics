name: Dev builds

on:
  push:
    branches:
      - master
  pull_request:
    branches-ignore:
      - 'ingametesting'
      
jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'adopt'
        cache: gradle

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4
      with:
        gradle-version: wrapper

    - name: Determine if this is a release version
      run: |
        IS_RELEASE=$(./gradlew -q printIsRelease)
        echo "Is release? $IS_RELEASE"
        echo "IS_RELEASE=$IS_RELEASE" >> $GITHUB_ENV

    - name: Debug CurseForge version resolution
      if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/master' }}
      env:
        DBO_UPLOAD_API_TOKEN: ${{ secrets.DBO_UPLOAD_API_TOKEN }}
      run: |
        python3 - <<'PY'
        import json
        import os
        import urllib.request

        token = os.environ["DBO_UPLOAD_API_TOKEN"]

        with open("gradle.properties", "r", encoding="utf-8") as handle:
            for line in handle:
                if line.startswith("gameVersions="):
                    requested_versions = [part.strip() for part in line.split("=", 1)[1].split(",") if part.strip()]
                    break
            else:
                raise SystemExit("gameVersions property not found in gradle.properties")

        def fetch_json(url: str):
            request = urllib.request.Request(url, headers={"X-Api-Token": token})
            with urllib.request.urlopen(request) as response:
                return json.load(response)

        def print_endpoint_report(endpoint: str):
            print(f"::group::CurseForge version debug ({endpoint})")
            try:
                version_types = fetch_json(f"https://{endpoint}.curseforge.com/api/game/version-types")
                versions = fetch_json(f"https://{endpoint}.curseforge.com/api/game/versions")
            except Exception as exc:
                print(f"Failed to query {endpoint} endpoint: {exc}")
                print("::endgroup::")
                return

            type_names = {
                item["id"]: item.get("name") or item.get("slug") or str(item["id"])
                for item in version_types
            }
            versions_by_name = {}
            for item in versions:
                versions_by_name.setdefault(item.get("name"), []).append(item)

            print("Available version types:")
            for item in version_types:
                print(f"  - id={item['id']} name={item.get('name')} slug={item.get('slug')}")

            print("Requested version matches:")
            missing = []
            for version in requested_versions:
                matches = versions_by_name.get(version, [])
                if not matches:
                    missing.append(version)
                    print(f"  - {version}: NO MATCH")
                    continue
                print(f"  - {version}:")
                for match in matches:
                    type_id = match.get("gameVersionTypeID")
                    type_name = type_names.get(type_id, f"unknown:{type_id}")
                    print(
                        "      "
                        f"id={match.get('id')} typeId={type_id} type={type_name} "
                        f"name={match.get('name')} slug={match.get('slug')}"
                    )

            if missing:
                print("Missing requested versions:")
                for version in missing:
                    print(f"  - {version}")
            else:
                print("All requested versions matched by name on this endpoint.")

            print("::endgroup::")

        for endpoint_name in ("bukkit", "minecraft"):
            print_endpoint_report(endpoint_name)
        PY

    - name: Run Gradle Build
      run: |
        ./gradlew clean build

    - name: Archive jar file
      uses: actions/upload-artifact@v4
      with:
        name: OldCombatMechanics
        path: build/libs/OldCombatMechanics.jar

    - name: Publish Snapshot to Hangar
      if: ${{ github.event_name == 'push' && github.event.pull_request == null && env.IS_RELEASE != 'true' }}
      env:
        HANGAR_API_TOKEN: ${{ secrets.HANGAR_API_TOKEN }}
      run: |
        ./gradlew publishPluginPublicationToHangar
